<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0e0a"/>
  <g transform="translate(256 256)">
    <!-- Stylized trout silhouette -->
    <g fill="#4ade80" transform="translate(-180 -90)">
      <path d="M0 90 C 30 30, 90 0, 180 0 C 280 0, 340 60, 360 90 C 340 120, 280 180, 180 180 C 90 180, 30 150, 0 90 Z"/>
      <!-- Tail -->
      <path d="M0 90 L -60 30 L -45 90 L -60 150 Z"/>
      <!-- Eye -->
      <circle cx="290" cy="70" r="10" fill="#0a0e0a"/>
      <circle cx="293" cy="67" r="4" fill="#e8efe8"/>
      <!-- Gill -->
      <path d="M240 50 Q 230 90, 240 130" stroke="#0a0e0a" stroke-width="4" fill="none"/>
      <!-- Fin (top) -->
      <path d="M150 30 L 200 0 L 220 30 Z" fill="#4ade80"/>
      <!-- Fin (bottom) -->
      <path d="M150 150 L 200 180 L 220 150 Z" fill="#4ade80"/>
    </g>
  </g>
</svg>
